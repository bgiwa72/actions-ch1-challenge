name: challenge

on: [push]

jobs:
  job1:
    name: Ubuntu job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4
      - name: Set up Go environment
        uses: actions/setup-go@v5.5
        with: 
          go-version: "1.20"
      - name: Compile Go file for ubuntu
        run: go build -o main main.go
      - name: Run the compiled binary
        run: ./main
  job2:
    name: Windows job
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Go environment
        uses: actions/setup-go@v5.5
        with:
          go-version: "1.20"
      - name: Compile Go file for Windows
        run: go build -o main.exe main.go
      - name: Run the compiled binary
        run: .\main.exe
  job3:
    name: MacOS job
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Go environment
        uses: actions/setup-go@v5.5
        with:
          go-version: "1.20"
      - name: Compile Go file for Ubuntu
        run: go build -o main main.go
      - name: Run the compiled Code
        run: ./main      
  job4:
    name: Cross compile
    runs-on: ubuntu-latest
    needs: [job1, job2, job3]   
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Set up Go environment
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.20"
      - name: Build binaries for each platform
        run: |
          echo " Cross compiling for all platforms:"
          GOOS=linux GOARCH=amd64 go build -o main-linux main.go
          GOOS=windows GOARCH=amd64 go build -o main-windows.exe main.go
          GOOS=darwin GOARCH=amd64 go Build -o main-macos main.go

            
